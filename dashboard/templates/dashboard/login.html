{% extends 'dashboard/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
        --primary: #4f46e5;
        --primary-light: #e0e7ff;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --dark: #1f2937;
        --light: #f9fafb;
        --gray: #9ca3af;
        --card-shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
    }
    
    .login-container {
        max-width: 500px;
        margin: 2rem auto;
        padding: 20px;
        font-family: 'Inter', sans-serif;
    }
    
    h2 {
        color: var(--dark);
        font-weight: 600;
        margin-bottom: 1.5rem;
        font-size: 1.75rem;
        position: relative;
        text-align: center;
    }
    
    h2::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: var(--primary);
        border-radius: 2px;
    }
    
    .login-card {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: var(--card-shadow);
    }
    
    .login-form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--dark);
    }
    
    .login-form input,
    .login-form select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        margin-bottom: 1rem;
    }
    
    .login-form input:focus,
    .login-form select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .btn-login {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.75rem;
        border-radius: 6px;
        width: 100%;
        cursor: pointer;
    }
    
    .btn-login:hover {
        background-color: #4338ca;
    }

    .register-link {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--dark);
    }
    
    .register-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    
    .register-link a:hover {
        text-decoration: underline;
    }

    .hidden {
        display: none;
    }
</style>

<div class="login-container">
    <h2>Login</h2>
    
    <div class="login-card">
        <form method="post" class="login-form">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <label>Role</label>
            <select name="role" id="role" required>
                <option value="">Select Role</option>
                <option value="STUDENT">Student</option>
                <option value="LECTURER">Lecturer</option>
            </select>

            <!-- Registration Number -->
            <div id="reg_group">
                <label>Registration Number</label>
                <input type="text" name="registration_number">
            </div>

            <!-- Staff Number -->
            <div id="staff_group" class="hidden">
                <label>Staff Number</label>
                <input type="text" name="staff_number">
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <!-- ✅ RESTORED REGISTER LINK -->
        <p class="register-link">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>.
        </p>

    </div>
</div>

<script>
    const role = document.getElementById('role');
    const regGroup = document.getElementById('reg_group');
    const staffGroup = document.getElementById('staff_group');

    function toggleFields() {
        if (role.value === 'LECTURER') {
            regGroup.style.display = 'none';
            staffGroup.style.display = 'block';
        } else if (role.value === 'STUDENT') {
            regGroup.style.display = 'block';
            staffGroup.style.display = 'none';
        } else {
            regGroup.style.display = 'none';
            staffGroup.style.display = 'none';
        }
    }

    toggleFields();
    role.addEventListener('change', toggleFields);
</script>

{% endblock %}
