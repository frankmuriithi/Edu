{% extends 'dashboard/base.html' %}
{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
        --primary: #4f46e5;
        --primary-light: #e0e7ff;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --dark: #1f2937;
        --light: #f9fafb;
        --gray: #9ca3af;
        --card-shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
    }
    
    .edit-session-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        font-family: 'Inter', sans-serif;
    }
    
    h2 {
        color: var(--dark);
        font-weight: 600;
        margin-bottom: 1.5rem;
        font-size: 1.5rem;
        position: relative;
        display: inline-block;
    }
    
    h2::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 0;
        width: 60px;
        height: 3px;
        background: var(--primary);
        border-radius: 2px;
    }
    
    .edit-session-form {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: var(--card-shadow);
    }
    
    .edit-session-form p {
        margin-bottom: 1.25rem;
    }
    
    .edit-session-form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--dark);
    }
    
    .edit-session-form input[type="text"],
    .edit-session-form input[type="datetime-local"],
    .edit-session-form input[type="time"],
    .edit-session-form select,
    .edit-session-form textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-family: 'Inter', sans-serif;
        transition: all 0.2s;
    }
    
    .edit-session-form input:focus,
    .edit-session-form select:focus,
    .edit-session-form textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .btn-update {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
    }
    
    .btn-update:hover {
        background-color: #4338ca;
        transform: translateY(-1px);
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .btn-update svg {
        margin-right: 8px;
    }
    
    .helptext {
        display: block;
        font-size: 0.8rem;
        color: var(--gray);
        margin-top: 0.25rem;
    }
    
    .errorlist {
        color: var(--danger);
        font-size: 0.9rem;
        margin-top: 0.25rem;
        padding-left: 0;
        list-style: none;
    }
    
    @media (max-width: 768px) {
        .edit-session-container {
            padding: 15px;
        }
        
        .edit-session-form {
            padding: 1.5rem;
        }
    }
</style>

<div class="edit-session-container">
    <h2>Edit Session</h2>
    
    <div class="edit-session-form">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-update">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                </svg>
                Update Session
            </button>
        </form>
    </div>
</div>
{% endblock %}
